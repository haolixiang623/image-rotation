# ============================================================
# 生产环境配置
#
# 使用方式:
#   docker compose -f docker-compose.prod.yml up -d    # 启动
#   docker compose -f docker-compose.prod.yml down     # 停止
#   docker compose -f docker-compose.prod.yml restart   # 重启
#
# ============================================================

services:

  api:
    image: image-rotation-api:2.0.0
    container_name: image-rotation-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - WORKERS=2
    volumes:
      - /opt/logs/image-rotation-api:/app/logs
      - /opt/data/input:/data/input
      - /opt/data/output:/data/output
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3

networks:
  default:
    driver: bridge