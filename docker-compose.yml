# ============================================================
# docker-compose — 本地开发 / 离线测试
#
# 启动:  docker compose up --build
# 停止:  docker compose down
# 压测:  docker compose run --rm test-client python tests/test_client.py \
#           --url http://api:8000 --file 待旋转图片/blank/blank/4.jpg
#           --output-dir tests/output --base64 --total 1
#
# 测试页: http://localhost:8000/test/
# ============================================================

services:

  # ── API 服务 ───────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HF_ENDPOINT: ${HF_ENDPOINT:-}        # 国内构建时设为 https://hf-mirror.com
    image: image-rotation-api:2.0.0
    container_name: image-rotation-api
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - WORKERS=21
    volumes:
      - ./logs:/app/logs            # 日志持久化到宿主机
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health', timeout=5).raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G

  # ── 集成测试客户端（可选）───────────────────────────────────
  # 启动方式: docker compose --profile test up test-client
  test-client:
    build:
      context: .
      dockerfile: Dockerfile
    image: image-rotation-api:2.0.0
    profiles:
      - test
    depends_on:
      api:
        condition: service_healthy
    command: >
      python -c "
      import httpx, sys
      # 等待服务就绪
      for i in range(30):
          try:
              r = httpx.get('http://api:8000/health', timeout=5)
              if r.status_code == 200:
                  print('API is healthy')
                  break
          except Exception:
              pass
      sys.exit(0)
      "
    working_dir: /app
